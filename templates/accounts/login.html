{% extends 'base.html' %}

{% block content %}
<style>
    .login-page {
        min-height: calc(100vh - 90px);
        background: linear-gradient(135deg, #e8f5f0, #f4fbf8);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        padding: 40px 20px;
    }

    .floating-books {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 1;
    }

    .floating-book {
        position: absolute;
        color: #064B35;
        opacity: 0.10;
        animation: floatBook 10s ease-in-out infinite;
    }

    .fb1 {
        font-size: 110px;
        left: 8%;
        top: 14%;
        animation-delay: 0s;
    }

    .fb2 {
        font-size: 90px;
        left: 18%;
        top: 34%;
        animation-delay: 1.2s;
    }

    .fb3 {
        font-size: 120px;
        left: 12%;
        bottom: 12%;
        animation-delay: 2.4s;
    }

    .fb4 {
        font-size: 100px;
        left: 28%;
        bottom: 20%;
        animation-delay: 3.1s;
    }

    .fb5 {
        font-size: 105px;
        right: 16%;
        top: 18%;
        animation-delay: 1.5s;
    }

    .fb6 {
        font-size: 80px;
        right: 24%;
        top: 42%;
        animation-delay: 2.2s;
    }

    .fb7 {
        font-size: 115px;
        right: 10%;
        bottom: 14%;
        animation-delay: 0.8s;
    }

    .fb8 {
        font-size: 85px;
        right: 22%;
        bottom: 28%;
        animation-delay: 2.8s;
    }

    @keyframes floatBook {
        0% {
            transform: translateY(0px) rotate(-6deg);
        }
        50% {
            transform: translateY(-18px) rotate(6deg);
        }
        100% {
            transform: translateY(0px) rotate(-6deg);
        }
    }

    .login-card {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(6, 75, 53, 0.08);
        border-radius: 24px;
        padding: 34px 30px;
        text-align: center;
        box-shadow: 0 18px 40px rgba(6, 75, 53, 0.14);
    }

    .login-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background: linear-gradient(135deg, #0b6b4c, #064B35);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 28px;
        box-shadow: 0 10px 24px rgba(6, 75, 53, 0.20);
    }

    .login-card h1 {
        margin: 0 0 8px;
        font-size: 38px;
        color: #0b2f24;
        font-weight: 800;
    }

    .login-card p {
        margin: 0 0 24px;
        color: #5b7168;
        font-size: 15px;
        line-height: 1.6;
    }

    .error-box {
        background: #fff1f2;
        color: #be123c;
        border: 1px solid #fecdd3;
        padding: 12px 14px;
        border-radius: 12px;
        font-size: 14px;
        margin-bottom: 18px;
        text-align: left;
    }

    .form-group {
        text-align: left;
        margin-bottom: 16px;
    }

    .form-group label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
        color: #12392c;
        font-size: 15px;
    }

    .form-group input {
        width: 100%;
        box-sizing: border-box;
        padding: 13px 14px;
        border: 1px solid #cfe2da;
        border-radius: 12px;
        font-size: 15px;
        outline: none;
        background: #f8fcfa;
        color: #12392c;
        transition: 0.25s ease;
    }

    .form-group input:focus {
        border-color: #0b6b4c;
        box-shadow: 0 0 0 3px rgba(11, 107, 76, 0.14);
        background: white;
    }

    .login-btn {
        width: 100%;
        border: none;
        border-radius: 12px;
        padding: 13px;
        background: linear-gradient(90deg, #0b6b4c, #064B35);
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 8px;
        transition: 0.25s ease;
        box-shadow: 0 10px 22px rgba(6, 75, 53, 0.18);
    }

    .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 26px rgba(6, 75, 53, 0.24);
    }

    .register-text {
        margin-top: 18px;
        font-size: 14px;
        color: #5d726a;
    }

    .register-text a {
        color: #064B35;
        font-weight: 700;
        text-decoration: none;
    }

    .register-text a:hover {
        text-decoration: underline;
    }

    @media (max-width: 768px) {
        .floating-book {
            opacity: 0.07;
        }

        .fb2, .fb4, .fb6, .fb8 {
            display: none;
        }

        .login-card {
            max-width: 380px;
            padding: 28px 22px;
        }

        .login-card h1 {
            font-size: 32px;
        }
    }
</style>

<div class="login-page">

    <div class="floating-books">
        <i class="fa-solid fa-book floating-book fb1"></i>
        <i class="fa-solid fa-book-open floating-book fb2"></i>
        <i class="fa-solid fa-bookmark floating-book fb3"></i>
        <i class="fa-solid fa-book floating-book fb4"></i>
        <i class="fa-solid fa-book-open floating-book fb5"></i>
        <i class="fa-solid fa-bookmark floating-book fb6"></i>
        <i class="fa-solid fa-book floating-book fb7"></i>
        <i class="fa-solid fa-book-open floating-book fb8"></i>
    </div>

    <div class="login-card">
        <div class="login-icon">
            <i class="fa-solid fa-user-lock"></i>
        </div>

        <h1>Log in</h1>
        <p>Access your library dashboard</p>

        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="text"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    value="{{ email|default:'' }}"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                >
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="register-text">
            Don’t have an account?
            <a href="{% url 'register' %}">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
