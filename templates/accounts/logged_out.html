{% extends 'base.html' %}
{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    .logout-page {
        min-height: calc(100vh - 90px);
        background: linear-gradient(135deg, #e8f5f0, #f4fbf8);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        padding: 40px 20px;
    }

    .floating-books {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
    }

    .floating-book {
        position: absolute;
        color: #064B35;
        opacity: 0.08;
        animation: floatBook 10s ease-in-out infinite;
    }

    .fb1 { font-size: 105px; left: 10%; top: 18%; }
    .fb2 { font-size: 82px; left: 18%; top: 42%; animation-delay: 1.4s; }
    .fb3 { font-size: 110px; left: 12%; bottom: 10%; animation-delay: 2.2s; }
    .fb4 { font-size: 85px; left: 28%; bottom: 18%; animation-delay: 3s; }

    .fb5 { font-size: 100px; right: 12%; top: 18%; animation-delay: 1s; }
    .fb6 { font-size: 78px; right: 22%; top: 46%; animation-delay: 2s; }
    .fb7 { font-size: 108px; right: 10%; bottom: 12%; animation-delay: 0.8s; }
    .fb8 { font-size: 82px; right: 24%; bottom: 24%; animation-delay: 2.8s; }

    @keyframes floatBook {
        0% { transform: translateY(0px) rotate(-5deg); }
        50% { transform: translateY(-16px) rotate(5deg); }
        100% { transform: translateY(0px) rotate(-5deg); }
    }

    .logout-card {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 420px;
        background: rgba(255,255,255,0.96);
        border: 1px solid rgba(6,75,53,0.08);
        border-radius: 24px;
        padding: 34px 30px;
        text-align: center;
        box-shadow: 0 18px 40px rgba(6,75,53,0.14);
    }

    .logout-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background: linear-gradient(135deg, #0b6b4c, #064B35);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 26px;
    }

    .logout-card h1 {
        font-size: 34px;
        color: #0b2f24;
        margin-bottom: 10px;
        font-weight: 800;
    }

    .logout-card p {
        color: #5b7168;
        font-size: 15px;
        margin-bottom: 22px;
    }
    .login-again-btn {
        width: 100%;
        border: none;
        border-radius: 12px;
        padding: 13px;
        background: linear-gradient(90deg, #0b6b4c, #064B35);
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.25s ease;
        box-shadow: 0 10px 22px rgba(6,75,53,0.18);
    }

    .login-again-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 26px rgba(6,75,53,0.24);
    }

    .login-box {
        margin-top: 20px;
        display: none;
        text-align: left;
    }

    .login-box.active {
        display: block;
    }

    .login-box label {
        font-weight: 700;
        margin-top: 12px;
        display: block;
        color: #12392c;
    }

    .login-box input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #cfe2da;
        margin-top: 6px;
        background: #f8fcfa;
    }

    .login-box input:focus {
        border-color: #0b6b4c;
        box-shadow: 0 0 0 3px rgba(11,107,76,0.14);
        outline: none;
    }

    .submit-login-btn {
        width: 100%;
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(90deg, #0b6b4c, #064B35);
        color: white;
        font-weight: bold;
    }

    .back-home {
        display: inline-block;
        margin-top: 16px;
        color: #064B35;
        font-size: 14px;
        text-decoration: none;
    }

    .back-home:hover {
        text-decoration: underline;
    }

    @media (max-width: 768px) {
        .floating-book { opacity: 0.06; }
        .fb2, .fb4, .fb6, .fb8 { display: none; }
    }
</style>

<div class="logout-page">

    <!-- FLOATING BOOKS -->
    <div class="floating-books">
        <i class="fa-solid fa-book floating-book fb1"></i>
        <i class="fa-solid fa-book-open floating-book fb2"></i>
        <i class="fa-solid fa-bookmark floating-book fb3"></i>
        <i class="fa-solid fa-book floating-book fb4"></i>

        <i class="fa-solid fa-book-open floating-book fb5"></i>
        <i class="fa-solid fa-book floating-book fb6"></i>
        <i class="fa-solid fa-bookmark floating-book fb7"></i>
        <i class="fa-solid fa-book floating-book fb8"></i>
    </div>

    <div class="logout-card">
        <div class="logout-icon">
            <i class="fa-solid fa-right-from-bracket"></i>
        </div>

        <h1>Logged out</h1>
        <p>You have been successfully logged out. See you again soon 👋</p>

        <button onclick="toggleLogin()" class="login-again-btn">
            Log in again
        </button>

        <div id="loginBox" class="login-box">
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <label>Email</label>
                <input type="text" name="email" placeholder="Enter your email">

                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password">

                <button type="submit" class="submit-login-btn">Login</button>
            </form>
        </div>

        <a href="/" class="back-home">Back to home</a>
    </div>

</div>

<script>
function toggleLogin() {
    document.getElementById("loginBox").classList.toggle("active");
}
</script>

{% endblock %}
