{% extends 'base.html' %}

{% block content %}
<style>
    .register-page {
        min-height: calc(100vh - 90px);
        background: linear-gradient(135deg, #e8f5f0, #f4fbf8);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        padding: 40px 20px;
    }

    .floating-books {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 1;
    }

    .floating-book {
        position: absolute;
        color: #064B35;
        opacity: 0.08;
        animation: floatBook 10s ease-in-out infinite;
    }

    /* MAJTAS */
    .fb1 {
        font-size: 105px;
        left: 10%;
        top: 18%;
        animation-delay: 0s;
    }

    .fb2 {
        font-size: 82px;
        left: 18%;
        top: 42%;
        animation-delay: 1.4s;
    }

    .fb3 {
        font-size: 110px;
        left: 12%;
        bottom: 10%;
        animation-delay: 2.2s;
    }

    .fb4 {
        font-size: 85px;
        left: 28%;
        bottom: 18%;
        animation-delay: 3s;
    }

    /* DJATHTAS */
    .fb5 {
        font-size: 100px;
        right: 12%;
        top: 18%;
        animation-delay: 1s;
    }

    .fb6 {
        font-size: 78px;
        right: 22%;
        top: 46%;
        animation-delay: 2s;
    }

    .fb7 {
        font-size: 108px;
        right: 10%;
        bottom: 12%;
        animation-delay: 0.8s;
    }

    .fb8 {
        font-size: 82px;
        right: 24%;
        bottom: 24%;
        animation-delay: 2.8s;
    }

    @keyframes floatBook {
        0% { transform: translateY(0px) rotate(-5deg); }
        50% { transform: translateY(-16px) rotate(5deg); }
        100% { transform: translateY(0px) rotate(-5deg); }
    }

    .register-card {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 430px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(6, 75, 53, 0.08);
        border-radius: 24px;
        padding: 34px 30px;
        text-align: center;
        box-shadow: 0 18px 40px rgba(6, 75, 53, 0.14);
    }

    .register-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background: linear-gradient(135deg, #0b6b4c, #064B35);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 28px;
    }

    .register-card h1 {
        margin: 0 0 8px;
        font-size: 36px;
        color: #0b2f24;
        font-weight: 800;
    }

    .register-card p {
        margin: 0 0 22px;
        color: #5b7168;
        font-size: 15px;
        line-height: 1.6;
    }

    .error-box {
        background: #fff1f2;
        color: #be123c;
        border: 1px solid #fecdd3;
        padding: 12px 14px;
        border-radius: 12px;
        font-size: 14px;
        margin-bottom: 18px;
        text-align: left;
    }

    .form-group {
        text-align: left;
        margin-bottom: 16px;
    }

    .form-group label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
        color: #12392c;
        font-size: 15px;
    }

    .form-group input {
        width: 100%;
        box-sizing: border-box;
        padding: 13px 14px;
        border: 1px solid #cfe2da;
        border-radius: 12px;
        font-size: 15px;
        outline: none;
        background: #f8fcfa;
        color: #12392c;
        transition: 0.25s ease;
    }

    .form-group input:focus {
        border-color: #0b6b4c;
        box-shadow: 0 0 0 3px rgba(11, 107, 76, 0.14);
        background: white;
    }

    .register-btn {
        width: 100%;
        border: none;
        border-radius: 12px;
        padding: 13px;
        background: linear-gradient(90deg, #0b6b4c, #064B35);
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 8px;
        transition: 0.25s ease;
        box-shadow: 0 10px 22px rgba(6, 75, 53, 0.18);
    }

    .register-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 26px rgba(6, 75, 53, 0.24);
    }

    .login-text {
        margin-top: 18px;
        font-size: 14px;
        color: #5d726a;
    }

    .login-text a {
        color: #064B35;
        font-weight: 700;
        text-decoration: none;
    }

    .login-text a:hover {
        text-decoration: underline;
    }

    @media (max-width: 768px) {
        .floating-book {
            opacity: 0.06;
        }

        .fb2, .fb4, .fb6, .fb8 {
            display: none;
        }

        .register-card {
            max-width: 390px;
            padding: 28px 22px;
        }

        .register-card h1 {
            font-size: 32px;
        }
    }
</style>

<div class="register-page">
    <div class="floating-books">
        <i class="fa-solid fa-book floating-book fb1"></i>
        <i class="fa-solid fa-book-open floating-book fb2"></i>
        <i class="fa-solid fa-bookmark floating-book fb3"></i>
        <i class="fa-solid fa-book floating-book fb4"></i>
        <i class="fa-solid fa-book-open floating-book fb5"></i>
        <i class="fa-solid fa-bookmark floating-book fb6"></i>
        <i class="fa-solid fa-book floating-book fb7"></i>
        <i class="fa-solid fa-book-open floating-book fb8"></i>
    </div>

    <div class="register-card">
        <div class="register-icon">
            <i class="fa-solid fa-user-plus"></i>
        </div>

        <h1>Register</h1>
        <p>Create your account and start managing your personal library.</p>

        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST" class="register-form">
    {% csrf_token %}

    <div class="form-group">
        <label for="first_name">Full Name</label>
        <input type="text" id="first_name" name="first_name" placeholder="Enter your full name" required>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
        <label for="password1">Password</label>
        <input type="password" id="password1" name="password1" placeholder="Enter your password" required>
    </div>

    <div class="form-group">
        <label for="password2">Confirm Password</label>
        <input type="password" id="password2" name="password2" placeholder="Confirm your password" required>
    </div>

    <button type="submit" class="auth-btn">Register</button>
</form>

        <div class="login-text">
            Already have an account?
            <a href="{% url 'login' %}">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
